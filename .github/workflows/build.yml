name: Build Floodgate Spigot

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - "LICENSE"
      - "README.md"
      - ".gitignore"
      - ".idea/copyright/*.xml"
      - ".github/workflows/pullrequest.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4.1.6
        with:
          submodules: recursive

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@db19848a5fa7950289d3668fb053140cf3028d43 # v3.3.2

      - name: Setup Java
        uses: actions/setup-java@99b8673ff64fbf99d8d325f52d9a5bdedb8483e9 # v4.2.1
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@417ae3ccd767c252f5661f1ace9f835f9654f2b5 # v3.1.0
        with:
          cache-read-only: ${{ github.ref_name != 'master' && github.ref_name != 'development' }}

      - name: Build Floodgate Spigot
        run: ./gradlew :spigot:build

      - name: Upload Floodgate Spigot Artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: floodgate-spigot
          path: spigot/build/libs/floodgate-spigot.jar
          if-no-files-found: error
